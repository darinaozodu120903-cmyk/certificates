<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Подарочный сертификат</title>
<style>
body {
  margin: 0;
  min-height: 100vh;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #fff0f5, #ffe4ec, #f8d7e8);
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
}

.card {
  background: white;
  width: 85%;
  max-width: 420px;
  padding: 35px 25px;
  border-radius: 28px;
  box-shadow: 0 20px 50px rgba(255, 77, 109, 0.25);
  border: 2px solid #ffd6e2;
}

.gift {
  font-size: 46px;
  margin-bottom: 10px;
}

h1 {
  color: #ff4d6d;
  font-size: 28px;
  margin: 10px 0;
}

.subtitle {
  color: #444;
  font-size: 18px;
  margin-bottom: 25px;
}

.certificate {
  background: #fff7fa;
  border: 1px dashed #ff8fab;
  border-radius: 18px;
  padding: 20px;
  margin: 20px 0;
  font-size: 22px;
  font-weight: bold;
}

.message {
  color: #555;
  font-size: 16px;
  line-height: 1.5;
  margin: 20px 0;
}

button {
  margin-top: 15px;
  padding: 14px 26px;
  border: none;
  background: #ff4d6d;
  color: white;
  border-radius: 999px;
  font-size: 17px;
  font-weight: bold;
  box-shadow: 0 8px 20px rgba(255, 77, 109, 0.35);
}

.small {
  margin-top: 18px;
  color: #999;
  font-size: 13px;
}
</style>
</head>

<body>

<div class="card">
  <div class="gift">🎁</div>

  <h1>Gavekort</h1>


  <div class="certificate">
    Помогити 😄
  </div>

  <div class="message">
    For моя Timosha❤️
  </div>

  <form action="https://formsubmit.co/ТВОЯ_ПОЧТА@gmail.com" method="POST">
    <input type="hidden" name="Сертификат" value="Помогити">
    <input type="hidden" name="_subject" value="Сертификат активирован">
    <button type="submit">Aktivere💌</button>
  </form>

  <div class="small">
    Kos deg!!!
  </div>
</div>

</body>
</html>
