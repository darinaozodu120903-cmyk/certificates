<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Подарочный сертификат</title>

<style>
body {
  margin: 0;
  min-height: 100vh;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #ff9a9e, #fad0c4, #fbc2eb, #a6c1ee);
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
  overflow: hidden;
}

.card {
  background: rgba(255, 255, 255, 0.95);
  width: 85%;
  max-width: 420px;
  padding: 35px 25px;
  border-radius: 30px;
  box-shadow: 0 25px 60px rgba(255, 0, 100, 0.35);
  border: 3px solid #ff85a2;
  backdrop-filter: blur(10px);
  z-index: 2;
}

.gift {
  font-size: 60px;
  animation: bounce 1.5s infinite;
}

@keyframes bounce {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}

h1 {
  color: #ff2e63;
  font-size: 30px;
}

.certificate {
  background: linear-gradient(135deg, #fff0f5, #ffe6f0);
  border: 2px dashed #ff4d6d;
  border-radius: 20px;
  padding: 22px;
  margin: 20px 0;
  font-size: 24px;
  font-weight: bold;
  color: #ff2e63;
}

.message {
  color: #333;
  font-size: 17px;
  margin: 20px 0;
}

button {
  margin-top: 15px;
  padding: 16px 30px;
  border: none;
  background: linear-gradient(135deg, #ff2e63, #ff6a88);
  color: white;
  border-radius: 999px;
  font-size: 18px;
  font-weight: bold;
  box-shadow: 0 10px 25px rgba(255, 0, 100, 0.4);
}

.small {
  margin-top: 18px;
  color: #777;
  font-size: 13px;
}

/* Сердечки */
.heart {
  position: absolute;
  color: #ff4d6d;
  font-size: 20px;
  animation: floatUp linear infinite;
}

@keyframes floatUp {
  0% {
    transform: translateY(100vh);
    opacity: 1;
  }
  100% {
    transform: translateY(-10vh);
    opacity: 0;
  }
}
</style>

</head>

<body>

<div class="card">
  <div class="gift">🎁</div>

  <h1>Gavekort</h1>

  <div class="certificate">
    Помогити 😄
  </div>

  <div class="message">
    For min Timosha ❤️
  </div>

  <form action="https://formsubmit.co/darinaoz.odu120903@gmail.com" method="POST">
    <input type="hidden" name="Сертификат" value="Помогити">
    <input type="hidden" name="_subject" value="Сертификат активирован">
    <button type="submit">Aktiver 💌</button>
  </form>

  <div class="small">
    Kos deg!!!
  </div>
</div>

<script>
function createHeart() {
  const heart = document.createElement("div");
  heart.className = "heart";
  heart.innerText = "💖";
  heart.style.left = Math.random() * 100 + "vw";
  heart.style.animationDuration = (3 + Math.random() * 3) + "s";
  document.body.appendChild(heart);

  setTimeout(() => {
    heart.remove();
  }, 6000);
}

setInterval(createHeart, 300);
</script>

</body>
</html>
